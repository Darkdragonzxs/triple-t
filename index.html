<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Triple-T Games</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0b1020;
      color: #e6ebff;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }
    h1 { margin: 0 0 8px; font-size: 1.8rem; }
    .sub { margin: 0 0 16px; color: #9aa8d1; }
    .toolbar {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr auto;
      margin-bottom: 14px;
    }
    #search {
      border: 1px solid #2a3559;
      background: #111933;
      color: #e6ebff;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
    }
    .status {
      align-self: center;
      color: #9aa8d1;
      font-size: 13px;
      text-align: right;
    }
    .sdk {
      margin-bottom: 14px;
      font-size: 12px;
      color: #8ea1d4;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px;
    }
    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: #121b36;
      border: 1px solid #243156;
      border-radius: 12px;
      overflow: hidden;
      transition: transform .12s ease, border-color .12s ease;
    }
    .card:hover { transform: translateY(-2px); border-color: #4d67b5; }
    .thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #0d1429;
      display: block;
    }
    .title {
      font-size: 13px;
      padding: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty { color: #9aa8d1; font-size: 14px; padding: 8px 0; }
    .error {
      margin: 20px;
      padding: 14px;
      border: 1px solid #4c2a40;
      border-radius: 10px;
      background: #2b1320;
      color: #ffd9e7;
      max-width: 820px;
    }
    .error a { color: #9ec4ff; }
  </style>

  <script src="https://sdk.yandex.ru/games/sdk/v2" defer></script>
  <script src="https://game-cdn.poki.com/scripts/v2/poki-sdk.js" defer></script>
</head>
<body>
  <main class="wrap" id="catalogRoot">
    <h1>Triple-T Games</h1>
    <p class="sub">Dynamic catalog loaded from JSON.</p>

    <div class="sdk" id="sdkStatus" aria-live="polite">SDK status: waiting…</div>

    <div class="toolbar">
      <input id="search" type="search" placeholder="Search games…" aria-label="Search games" />
      <div class="status"><span id="count">0</span> shown</div>
    </div>

    <div id="empty" class="empty" hidden>No games found.</div>
    <section id="cards" class="cards" aria-live="polite"></section>
  </main>

  <script>
    const CDN_BASE = 'https://cdn.jsdelivr.net/gh/Hydra-Network/hydra-assets@main/';
    const JSON_CANDIDATES = [
      `${CDN_BASE}games.json`,
      './games.json',
      './gmes.json'
    ];
    const CURRENT_GAME_KEY = 'triple_t_current_game';
    const RECENT_GAMES_KEY = 'triple_t_recent_games';
    const RECENT_LIMIT = 20;

    const elCards = document.getElementById('cards');
    const elSearch = document.getElementById('search');
    const elCount = document.getElementById('count');
    const elEmpty = document.getElementById('empty');
    const elSdkStatus = document.getElementById('sdkStatus');

    let allGames = [];

    function safeParse(value, fallback) {
      try { return JSON.parse(value); } catch { return fallback; }
    }

    function toAssetUrl(path) {
      if (!path) return '';
      if (/^https?:\/\//i.test(path)) return path;
      return `${CDN_BASE}${String(path).replace(/^\/+/, '')}`;
    }

    function normalizeGamePath(fileName) {
      const clean = String(fileName || '').trim().replace(/^\/+/, '');
      if (!clean) return null;
      if (clean.startsWith('gmes/')) return `/${clean}`;
      if (clean.endsWith('.html')) return `/gmes/${clean}`;
      return null;
    }

    function sanitizeGamePath(input) {
      const str = String(input || '').trim();
      if (!str) return null;

      if (/^https?:\/\//i.test(str)) {
        try {
          const url = new URL(str);
          if (!/cdn\.jsdelivr\.net$/i.test(url.hostname)) return null;
          const path = decodeURIComponent(url.pathname).replace(/^\/+/, '');
          if (!path.startsWith('gh/Hydra-Network/hydra-assets@main/')) return null;
          return normalizeGamePath(path.replace(/^gh\/Hydra-Network\/hydra-assets@main\//, ''));
        } catch {
          return null;
        }
      }

      return normalizeGamePath(str.replace(/^\/+/, ''));
    }

    function toCdnUrl(gamePath) {
      return `${CDN_BASE}${gamePath.replace(/^\/+/, '')}`;
    }

    function saveRecent(gamePath) {
      const current = safeParse(localStorage.getItem(RECENT_GAMES_KEY), []);
      const list = Array.isArray(current) ? current.filter((x) => typeof x === 'string') : [];
      const deduped = [gamePath, ...list.filter((x) => x !== gamePath)].slice(0, RECENT_LIMIT);
      localStorage.setItem(RECENT_GAMES_KEY, JSON.stringify(deduped));
    }

    function render(games, filter = '') {
      const q = filter.trim().toLowerCase();
      const filtered = q
        ? games.filter((g) => `${g.title || ''} ${g.file_name || ''}`.toLowerCase().includes(q))
        : games;

      elCards.innerHTML = filtered.map((game) => {
        const title = game.title || game.file_name || 'Untitled';
        const gamePath = normalizeGamePath(game.file_name);
        if (!gamePath) return '';
        const href = `?url=${encodeURIComponent(gamePath)}`;
        const thumb = toAssetUrl(game.thumb || '');
        return `
          <a class="card" href="${href}" data-title="${escapeAttr(title)}" data-file="${escapeAttr(game.file_name || '')}">
            <img class="thumb" loading="lazy" src="${thumb}" alt="${escapeAttr(title)} thumbnail" />
            <div class="title" title="${escapeAttr(title)}">${escapeHtml(title)}</div>
          </a>
        `;
      }).join('');

      elCount.textContent = String(filtered.length);
      elEmpty.hidden = filtered.length > 0;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/"/g, '&quot;');
    }

    async function loadGames() {
      let lastError = null;
      for (const url of JSON_CANDIDATES) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) continue;
          const data = await res.json();
          if (Array.isArray(data)) return data;
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError || new Error('Could not load games JSON.');
    }

    async function maybeLoadGameFromQuery() {
      const params = new URLSearchParams(location.search);
      const raw = params.get('url') || params.get('path');
      if (!raw) return false;

      const gamePath = sanitizeGamePath(raw);
      if (!gamePath) {
        document.body.innerHTML = '<div class="error">Invalid game URL. <a href="/">Back to games</a></div>';
        return true;
      }

      localStorage.setItem(CURRENT_GAME_KEY, gamePath);
      saveRecent(gamePath);

      const gameUrl = toCdnUrl(gamePath);
      try {
        const res = await fetch(gameUrl, { method: 'GET', cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const html = await res.text();
        writeGameDocument(html);
      } catch (err) {
        console.error(err);
        document.body.innerHTML = `<div class="error">Failed to load game from CDN. <a href="${gameUrl}">Open file directly</a> · <a href="/">Back to games</a></div>`;
      }

      return true;
    }

    function writeGameDocument(html) {
      const parser = new DOMParser();
      const parsed = parser.parseFromString(html, 'text/html');
      const docTitle = parsed.title || 'Triple-T Game';
      parsed.title = docTitle;

      const controls = parsed.createElement('div');
      controls.setAttribute('id', 'tripleTControls');
      controls.innerHTML = `
        <button id="ttBackBtn" title="Back to games">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M20 11H7.83l4.58-4.59L11 5l-7 7 7 7 1.41-1.41L7.83 13H20z"/></svg>
        </button>
        <button id="ttFsBtn" title="Fullscreen">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm0-4h2V7h3V5H5v5zm10 7h-3v2h5v-5h-2v3zm0-12v3h2V5h-5v2h3z"/></svg>
        </button>
      `;
      parsed.body.prepend(controls);

      const style = parsed.createElement('style');
      style.textContent = `
        #tripleTControls{
          position:fixed;top:10px;left:10px;z-index:2147483647;
          display:flex;gap:8px;
        }
        #tripleTControls button{
          width:40px;height:40px;border:1px solid rgba(255,255,255,.25);
          border-radius:999px;background:rgba(0,0,0,.55);color:#fff;cursor:pointer;
          display:grid;place-items:center;padding:0;
        }
        #tripleTControls svg{width:22px;height:22px}
      `;
      parsed.head.appendChild(style);

      const script = parsed.createElement('script');
      script.textContent = `
        (function () {
          var back = document.getElementById('ttBackBtn');
          var fs = document.getElementById('ttFsBtn');
          if (back) {
            back.addEventListener('click', function () {
              try { localStorage.removeItem('triple_t_recent_games'); } catch {}
              location.href = '/';
            });
          }
          if (fs) {
            fs.addEventListener('click', function () {
              var target = document.documentElement;
              if (target && target.requestFullscreen) target.requestFullscreen().catch(function(){});
            });
          }
        })();
      `;
      parsed.body.appendChild(script);

      const serialized = '<!doctype html>\\n' + parsed.documentElement.outerHTML;
      document.open();
      document.write(serialized);
      document.close();
    }

    function initSdkStatus() {
      const bits = [];
      if (window.PokiSDK) bits.push('Poki loaded');
      if (window.YaGames) bits.push('Yandex loaded');
      elSdkStatus.textContent = bits.length ? `SDK status: ${bits.join(' • ')}` : 'SDK status: not available';

      if (window.PokiSDK?.init) {
        window.PokiSDK.init().catch(() => {});
      }

      if (window.YaGames?.init) {
        window.YaGames.init().catch(() => {});
      }
    }

    elSearch.addEventListener('input', () => render(allGames, elSearch.value));

    window.addEventListener('load', async () => {
      const handledGameLoad = await maybeLoadGameFromQuery();
      if (handledGameLoad) return;

      initSdkStatus();
      try {
        allGames = await loadGames();
        render(allGames);
      } catch (err) {
        console.error(err);
        elEmpty.hidden = false;
        elEmpty.textContent = 'Failed to load games list.';
      }
    });
  </script>
</body>
</html>
